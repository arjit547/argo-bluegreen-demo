name: Build Push Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  deploy:

    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: argo

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
          -t $IMAGE_NAME:${{ github.sha }} \
          ./app

      - name: Tag Image
        run: |
          docker tag \
          $IMAGE_NAME:${{ github.sha }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$IMAGE_NAME:${{ github.sha }}

      - name: Push Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$IMAGE_NAME:${{ github.sha }}

      - name: Update Rollout Image
        run: |
          sed -i "s|image:.*|image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$IMAGE_NAME:${{ github.sha }}|g" k8s/rollout.yaml

      - name: Commit Manifest
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add k8s/rollout.yaml

          git commit -m "Deploy ${{ github.sha }}" || echo "No Changes"

          git push
