name: Build Push Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  deploy:

    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: argo

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        run: |
          docker build \
          -t $IMAGE_NAME:${{ github.sha }} \
          ./app

      - name: Push Image
        run: |

          docker tag \
          $IMAGE_NAME:${{ github.sha }} \
          638111422814.dkr.ecr.us-east-1.amazonaws.com/argo:${{ github.sha }}

          docker push \
          638111422814.dkr.ecr.us-east-1.amazonaws.com/argo:${{ github.sha }}

      - name: Update Rollout
        run: |

          sed -i "s|image:.*|image: 638111422814.dkr.ecr.us-east-1.amazonaws.com/argo:${{ github.sha }}|g" k8s/rollout.yaml

      - name: Commit Manifest

        run: |

          git config user.email github-actions@github.com

          git config user.name github-actions

          git add k8s/rollout.yaml

          git commit -m "Deploy ${{ github.sha }}" || true

          git push
