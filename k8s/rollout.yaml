apiVersion: argoproj.io/v1alpha1
kind: Rollout

metadata:
  name: argo-demo
  namespace: demo

spec:

  replicas: 2

  selector:
    matchLabels:
      app: argo-demo

  template:

    metadata:
      labels:
        app: argo-demo

    spec:

      containers:

      - name: argo-demo

        image: 638111422814.dkr.ecr.us-east-1.amazonaws.com/argo:e25770b92a5b6fde2b2ba6e4dbf500f68c055202

        imagePullPolicy: Always

        ports:

        - containerPort: 3000

  strategy:

    blueGreen:

      activeService: argo-demo-active

      previewService: argo-demo-preview

      autoPromotionEnabled: true

      previewReplicaCount: 1
